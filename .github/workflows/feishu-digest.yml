name: Daily Feishu Digest

on:
  schedule:
    # 每天 02:00 UTC = 北京时间 10:00
    - cron: '0 2 * * *'
  workflow_dispatch:   # 可手动触发测试

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send digest to Feishu
        env:
          FEISHU_WEBHOOK:    ${{ secrets.FEISHU_WEBHOOK }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/feishu_deliver.py
